<!DOCTYPE html>

<head>

        .action-buttons {

        /* Pulsanti azioni tabella: stessa altezza dei .btn standard, emoji invio più leggibile */

            padding: 10px 16px;
            font-size: 14px;
            min-height: 40px;
            display: inline-flex;
            align-items: center;

        .preventivi-table .action-buttons .preventivi-email-icon {

<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>📋 Gestione Preventivi</h1>
                <p style="opacity: 0.9; margin-top: 5px;">Gestisci preventivi per lavori conto terzi</p>
            </div>
            <div class="header-actions">

        <div class="content">
            <div id="alert-container"></div>
            
            <div class="filters">
                <div class="filter-group">
                    <label>Filtra per Stato</label>
                    <select id="filter-stato">
                        <option value="">Tutti</option>
                        <option value="bozza">Bozza</option>
                        <option value="inviato">Inviato</option>
                        <option value="accettato_email">Accettato (Email)</option>
                        <option value="accettato_manager">Accettato (Manager)</option>
                        <option value="rifiutato">Rifiutato</option>
                        <option value="scaduto">Scaduto</option>
                        <option value="pianificato">Pianificato</option>
                        <option value="annullato">Annullato</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Filtra per Cliente</label>
                    <select id="filter-cliente">
                        <option value="">Tutti i clienti</option>

                </div>
                <div class="filter-group">
                    <label>Categoria lavoro</label>
                    <select id="filter-categoria-lavoro">
                        <option value="">Tutte</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Tipo lavoro</label>
                    <select id="filter-tipo-lavoro">
                        <option value="">Tutti</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Categoria coltura</label>
                    <select id="filter-categoria-coltura">
                        <option value="">Tutte</option>

                <div class="filter-group">
                    <label>Cerca Numero/Cliente</label>
                    <input type="text" id="filter-search" placeholder="Numero preventivo, cliente...">
                </div>
                <div class="filter-group" style="align-self: flex-end;">
                    <button class="btn btn-secondary" onclick="resetFilters()">Pulisci Filtri</button>
                </div>
            </div>

            <div class="section-header">
                <h2>Elenco Preventivi</h2>
                <div id="preventivi-count">0 preventivi</div>
            </div>

            <div id="preventivi-container" class="table-responsive">
                <div class="loading">Caricamento preventivi...</div>
            </div>

    <!-- Placeholder Tony currentTableData (aggiornato da renderPreventivi) -->
    <script>window.currentTableData = window.currentTableData || { pageType: 'preventivi', summary: 'Caricamento dati in corso...', items: [] };</script>

    <!-- Load Firebase config from external file -->
    <script>
        const configScript = document.createElement('script');
        configScript.src = '../../../core/config/firebase-config.js';
        configScript.onerror = function() {
            const fallbackScript = document.createElement('script');
            fallbackScript.src = 'https://raw.githubusercontent.com/VitaraDragon/gfv-platform/main/core/config/firebase-config.js';
            document.head.appendChild(fallbackScript);
        };
        document.head.appendChild(configScript);
    </script>
    
    <!-- Firebase SDK -->
    <script type="module">
        import { formatDateLikeToItalianLongLocal } from '../../../core/js/date-format-it.js';
        import { initializeFirebase, getAuthInstance, getDb, getHttpsCallable } from '../../../core/services/firebase-service.js';
        import { onAuthStateChanged } from '../../../core/services/firebase-service.js';
        import { collection, getDocs, doc, getDoc, addDoc, updateDoc, deleteDoc, query, where, orderBy, serverTimestamp, Timestamp } from '../../../core/services/firebase-service.js';

        // Funzione per attendere il caricamento della configurazione Firebase
        function waitForConfig() {
            return new Promise((resolve, reject) => {
                if (typeof window.firebaseConfig !== 'undefined') {
                    resolve(window.firebaseConfig);
                    return;
                }
                
                let attempts = 0;
                const maxAttempts = 50;
                
                const checkInterval = setInterval(() => {
                    attempts++;
                    if (typeof window.firebaseConfig !== 'undefined') {
                        clearInterval(checkInterval);
                        resolve(window.firebaseConfig);
                    } else if (attempts >= maxAttempts) {
                        clearInterval(checkInterval);
                        reject(new Error('Firebase config not loaded after 5 seconds'));
                    }
                }, 100);
            });
        }

        const firebaseConfig = await waitForConfig();
        initializeFirebase(firebaseConfig);
        const auth = getAuthInstance();
        const db = getDb();
        const sendTransactionalEmail = getHttpsCallable('sendTransactionalEmail');

        if (!window.currentTableData || !window.currentTableData.summary || window.currentTableData.summary === '') {
            window.currentTableData = { pageType: 'preventivi', summary: 'Caricamento dati in corso...', items: [] };
        }

        let currentUser = null;
        let currentTenantId = null;
        let preventivi = [];
        let clienti = [];
        let coltureList = [];
        let categorieColtureList = [];
        let tipiLavoroList = [];
        let categorieLavoriPrincipali = [];
        let sottocategorieLavoriMap = new Map();

        // Verifica autenticazione
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                try {
                    const userDoc = await getDoc(doc(db, 'users', user.uid));
                    if (userDoc.exists()) {
                        const userData = userDoc.data();
                        currentTenantId = userData.tenantId;

                        // Verifica permessi (solo Manager o Amministratore)
                        const ruoli = userData.ruoli || [];
                        const isManager = ruoli.some(r => {
                            const roleLower = r.toLowerCase();
                            return roleLower.includes('manager') || roleLower.includes('amministratore');
                        });

                        if (!isManager) {
                            showAlert('Non hai i permessi per accedere a questa pagina', 'error');
                            setTimeout(() => {
                                window.location.href = '../../../core/dashboard-standalone.html';
                            }, 2000);
                            return;
                        }
                        
                        // Mostra link impostazioni (solo Manager/Amministratore, già verificato sopra)
                        const impostazioniLink = document.getElementById('impostazioni-link');
                        if (impostazioniLink) {
                            impostazioniLink.style.display = 'inline-flex';
                        }

                        // Carica clienti per mostrare nomi e popola filtro cliente
                        await loadClienti();
                        populateClienteFilter();
                        // Carica colture e categorie per filtro categoria coltura
                        await loadColtureECategorie();
                        populateCategoriaColturaFilter();
                        // Carica categorie lavori e tipi lavoro per filtro categoria lavoro
                        await loadCategorieETipiLavoro();
                        populateCategoriaLavoroFilter();
                        // Setup filtri
                        setupFilters();
                        // Carica preventivi e popola filtro tipo lavoro
                        await loadPreventivi();
                        populateTipoLavoroFilter();
                    } else {
                        window.location.href = '../../../core/auth/login-standalone.html';
                    }
                } catch (error) {
                    console.error('Errore:', error);
                    showAlert('Errore caricamento dati', 'error');
                }
            } else {
                window.location.href = '../../../core/auth/login-standalone.html';
            }
        });

        // Carica clienti
        async function loadClienti() {
            try {
                if (!currentTenantId) return;
                const clientiQuery = query(
                    collection(db, 'tenants', currentTenantId, 'clienti'),
                    orderBy('ragioneSociale')
                );
                const snapshot = await getDocs(clientiQuery);
                clienti = [];
                snapshot.forEach(doc => {
                    clienti.push({ id: doc.id, ...doc.data() });
                });
            } catch (error) {
                console.error('Errore caricamento clienti:', error);
            }
        }

        // Setup filtri
        function setupFilters() {
            document.getElementById('filter-stato').addEventListener('change', () => filterPreventivi());
            document.getElementById('filter-cliente').addEventListener('change', () => filterPreventivi());
            document.getElementById('filter-categoria-lavoro').addEventListener('change', () => filterPreventivi());
            document.getElementById('filter-tipo-lavoro').addEventListener('change', () => filterPreventivi());
            document.getElementById('filter-categoria-coltura').addEventListener('change', () => filterPreventivi());
            document.getElementById('filter-search').addEventListener('input', () => filterPreventivi());
        }

        // Reset filtri - rendi globale per accesso da HTML
        window.resetFilters = function() {
            document.getElementById('filter-stato').value = '';
            document.getElementById('filter-cliente').value = '';
            document.getElementById('filter-categoria-lavoro').value = '';
            document.getElementById('filter-tipo-lavoro').value = '';
            document.getElementById('filter-categoria-coltura').value = '';
            document.getElementById('filter-search').value = '';
            filterPreventivi();
        }

        // Carica preventivi
        async function loadPreventivi() {
            const container = document.getElementById('preventivi-container');
            container.innerHTML = '<div class="loading">Caricamento preventivi...</div>';

            try {
                if (!currentTenantId) {
                    container.innerHTML = '<div class="empty-state">Nessun tenant trovato</div>';
                    return;
                }

                const preventiviQuery = query(
                    collection(db, 'tenants', currentTenantId, 'preventivi'),
                    orderBy('numero', 'desc')
                );
                const snapshot = await getDocs(preventiviQuery);
                preventivi = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    preventivi.push({ 
                        id: doc.id, 
                        ...data,
                        dataScadenza: data.dataScadenza?.toDate ? data.dataScadenza.toDate() : null,
                        dataInvio: data.dataInvio?.toDate ? data.dataInvio.toDate() : null,
                        dataAccettazione: data.dataAccettazione?.toDate ? data.dataAccettazione.toDate() : null
                    });
                });
                filterPreventivi();
                tryTonyPendingPreventiviAction();
            } catch (error) {
                console.error('Errore caricamento preventivi:', error);
                showAlert('Errore caricamento preventivi: ' + error.message, 'error');
                container.innerHTML = '<div class="empty-state">Errore caricamento preventivi</div>';
            }
        }

        function tryTonyPendingPreventiviAction() {
            try {
                var raw = sessionStorage.getItem('tony_pending_preventivi_action');
                if (!raw) return;
                sessionStorage.removeItem('tony_pending_preventivi_action');
                var params = JSON.parse(raw);
                if (typeof window.tonyPreventivoListAction !== 'function') return;
                setTimeout(function () {
                    window.tonyPreventivoListAction(params).then(function (res) {
                        if (res && res.message) {
                            if (typeof window.appendMessage === 'function') {
                                window.appendMessage(res.message, res.ok ? 'tony' : 'error');
                            } else {
                                showAlert(res.message, res.ok ? 'success' : 'error');
                            }
                        }
                    }).catch(function (e) {
                        showAlert((e && e.message) ? e.message : 'Errore azione Tony', 'error');
                    });
                }, 500);
            } catch (e) {
                console.warn('tryTonyPendingPreventiviAction', e);
            }
        }

        // Popola il select Filtra per Cliente (dopo caricamento clienti)
        function populateClienteFilter() {
            const sel = document.getElementById('filter-cliente');
            if (!sel) return;
            sel.innerHTML = '<option value="">Tutti i clienti</option>';
            (clienti || []).sort((a, b) => (a.ragioneSociale || '').localeCompare(b.ragioneSociale || '')).forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.id || '';
                opt.textContent = c.ragioneSociale || 'Cliente senza nome';
                sel.appendChild(opt);
            });
        }

        // Carica colture e categorie (per filtro categoria coltura)
        async function loadColtureECategorie() {
            try {
                if (!currentTenantId) return;
                const [coltureSnap, categorieSnap] = await Promise.all([
                    getDocs(query(collection(db, 'tenants', currentTenantId, 'colture'), orderBy('nome'))),
                    getDocs(collection(db, 'tenants', currentTenantId, 'categorie'))
                ]);
                coltureList = [];
                coltureSnap.forEach(doc => coltureList.push({ id: doc.id, ...doc.data() }));
                const categorieRaw = [];
                categorieSnap.forEach(doc => categorieRaw.push({ id: doc.id, ...doc.data() }));
                // Solo categorie esclusivamente per colture (Vigneto, Frutteto, Seminativo...), non 'entrambi' per evitare categorie lavori (es. Lavorazioni tra le file)
                categorieColtureList = categorieRaw.filter(c => (c.applicabileA || '').toLowerCase() === 'colture');
                categorieColtureList.sort((a, b) => (a.ordine || 999) - (b.ordine || 999));
            } catch (e) {
                console.warn('Preventivi: caricamento colture/categorie per filtro fallito', e);
                coltureList = [];
                categorieColtureList = [];
            }
        }

        // Popola il select Categoria coltura (dopo loadColtureECategorie)
        function populateCategoriaColturaFilter() {
            const sel = document.getElementById('filter-categoria-coltura');
            if (!sel) return;
            sel.innerHTML = '<option value="">Tutte</option>';
            (categorieColtureList || []).forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat.id || '';
                opt.textContent = cat.nome || cat.id || '';
                sel.appendChild(opt);
            });
        }

        // Carica categorie lavori (principali + sottocategorie) e tipi lavoro (per filtro categoria lavoro)
        async function loadCategorieETipiLavoro() {
            try {
                if (!currentTenantId) return;
                const [categorieSnap, tipiSnap] = await Promise.all([
                    getDocs(collection(db, 'tenants', currentTenantId, 'categorie')),
                    getDocs(query(collection(db, 'tenants', currentTenantId, 'tipiLavoro'), orderBy('nome')))
                ]);
                categorieLavoriPrincipali = [];
                sottocategorieLavoriMap = new Map();
                categorieSnap.forEach(doc => {
                    const d = { id: doc.id, ...doc.data() };
                    const a = (d.applicabileA || '').toLowerCase();
                    if (a !== 'lavori' && a !== 'entrambi') return;
                    if ((d.nome || '').toLowerCase().includes('test')) return;
                    if (!d.parentId) {
                        categorieLavoriPrincipali.push(d);
                    } else {
                        if (!sottocategorieLavoriMap.has(d.parentId)) sottocategorieLavoriMap.set(d.parentId, []);
                        sottocategorieLavoriMap.get(d.parentId).push(d);
                    }
                });
                categorieLavoriPrincipali.sort((a, b) => (a.ordine || 999) - (b.ordine || 999));
                sottocategorieLavoriMap.forEach(arr => arr.sort((a, b) => (a.ordine || 999) - (b.ordine || 999)));
                tipiLavoroList = [];
                tipiSnap.forEach(doc => tipiLavoroList.push({ id: doc.id, ...doc.data() }));
            } catch (e) {
                console.warn('Preventivi: caricamento categorie/tipi lavoro per filtro fallito', e);
                categorieLavoriPrincipali = [];
                sottocategorieLavoriMap = new Map();
                tipiLavoroList = [];
            }
        }

        // Restituisce i nomi dei tipi lavoro che appartengono alla categoria (o sottocategoria) catId
        function getTipiLavoroNamesForCategoriaId(catId) {
            if (!catId || !tipiLavoroList.length) return [];
            const sottocat = sottocategorieLavoriMap.get(catId);
            const childrenIds = sottocat ? sottocat.map(c => c.id) : [];
            return tipiLavoroList
                .filter(t => t.categoriaId === catId || (t.sottocategoriaId && (t.sottocategoriaId === catId || childrenIds.includes(t.sottocategoriaId))))
                .map(t => (t.nome || '').trim())
                .filter(Boolean);
        }

        // Popola il select Categoria lavoro (principali + sottocategorie così appare anche "Vendemmia")
        function populateCategoriaLavoroFilter() {
            const sel = document.getElementById('filter-categoria-lavoro');
            if (!sel) return;
            sel.innerHTML = '<option value="">Tutte</option>';
            (categorieLavoriPrincipali || []).forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat.id || '';
                opt.textContent = cat.nome || cat.id || '';
                sel.appendChild(opt);
                const sottocat = sottocategorieLavoriMap.get(cat.id) || [];
                sottocat.forEach(sub => {
                    const subOpt = document.createElement('option');
                    subOpt.value = sub.id || '';
                    subOpt.textContent = '  — ' + (sub.nome || sub.id || '');
                    sel.appendChild(subOpt);
                });
            });
        }

        // Popola il select Tipo lavoro con i valori distinti dai preventivi (dopo loadPreventivi)
        function populateTipoLavoroFilter() {
            const sel = document.getElementById('filter-tipo-lavoro');
            if (!sel) return;
            const distinct = [...new Set((preventivi || []).map(p => p.tipoLavoro).filter(Boolean))].sort((a, b) => String(a).localeCompare(b));
            sel.innerHTML = '<option value="">Tutti</option>';
            distinct.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t;
                opt.textContent = t;
                sel.appendChild(opt);
            });
        }

        // Filtra preventivi
        function filterPreventivi() {
            const filterStato = document.getElementById('filter-stato').value;
            const filterClienteId = document.getElementById('filter-cliente').value;
            const filterCategoriaLavoroId = document.getElementById('filter-categoria-lavoro').value;
            const filterTipoLavoro = document.getElementById('filter-tipo-lavoro').value;
            const filterCategoriaColturaId = document.getElementById('filter-categoria-coltura').value;
            const filterSearch = document.getElementById('filter-search').value.toLowerCase();

            // Nomi tipi lavoro per la categoria lavoro selezionata (es. "Vendemmia" -> Vendemmia Meccanica, Vendemmia Manuale)
            let tipiLavoroNomiPerCategoria = [];
            if (filterCategoriaLavoroId) {
                tipiLavoroNomiPerCategoria = getTipiLavoroNamesForCategoriaId(filterCategoriaLavoroId);
            }

            // Nomi colture per la categoria selezionata (per filtro categoria coltura)
            let coltureNomiPerCategoria = [];
            if (filterCategoriaColturaId && coltureList.length > 0) {
                coltureNomiPerCategoria = coltureList.filter(c => (c.categoriaId || '') === filterCategoriaColturaId).map(c => (c.nome || '').trim()).filter(Boolean);
            }

            let filtered = preventivi.filter(preventivo => {
                // Filtro stato
                if (filterStato && preventivo.stato !== filterStato) {
                    return false;
                }

                // Filtro cliente
                if (filterClienteId && preventivo.clienteId !== filterClienteId) {
                    return false;
                }

                // Filtro categoria lavoro: il preventivo ha tipoLavoro (nome); deve essere uno dei tipi della categoria
                if (tipiLavoroNomiPerCategoria.length > 0) {
                    const tipoPreventivo = (preventivo.tipoLavoro || '').trim();
                    if (!tipoPreventivo || !tipiLavoroNomiPerCategoria.some(n => n.toLowerCase() === tipoPreventivo.toLowerCase())) {
                        return false;
                    }
                }

                // Filtro tipo lavoro (esatto)
                if (filterTipoLavoro && (preventivo.tipoLavoro || '') !== filterTipoLavoro) {
                    return false;
                }

                // Filtro categoria coltura: il preventivo ha coltura (nome); deve appartenere alla categoria
                if (coltureNomiPerCategoria.length > 0) {
                    const colturaPreventivo = (preventivo.coltura || '').trim();
                    if (!colturaPreventivo || !coltureNomiPerCategoria.some(n => n.toLowerCase() === colturaPreventivo.toLowerCase())) {
                        return false;
                    }
                }

                // Filtro ricerca
                if (filterSearch) {
                    const cliente = clienti.find(c => c.id === preventivo.clienteId);
                    const clienteNome = cliente?.ragioneSociale || '';
                    const searchText = [
                        preventivo.numero || '',
                        clienteNome
                    ].join(' ').toLowerCase();
                    
                    if (!searchText.includes(filterSearch)) {
                        return false;
                    }
                }

                return true;
            });

            renderPreventivi(filtered);
        }

                }[preventivo.stato] || { text: preventivo.stato, class: 'badge-secondary' };

        // Invia preventivo - rendi globale per accesso da HTML
        window.inviaPreventivo = async function(preventivoId) {
            try {
                if (!currentTenantId) {
                    showAlert('Errore: nessun tenant disponibile', 'error');
                    return;
                }

                // Carica preventivo completo
                const preventivoRef = doc(db, 'tenants', currentTenantId, 'preventivi', preventivoId);
                const preventivoSnap = await getDoc(preventivoRef);
                if (!preventivoSnap.exists()) {
                    showAlert('Preventivo non trovato', 'error');
                    return;
                }
                const preventivo = { id: preventivoSnap.id, ...preventivoSnap.data() };

                // Verifica che abbia token di accettazione
                if (!preventivo.tokenAccettazione) {
                    showAlert('Errore: token di accettazione mancante', 'error');
                    return;
                }

                // Carica cliente
                const clienteRef = doc(db, 'tenants', currentTenantId, 'clienti', preventivo.clienteId);
                const clienteSnap = await getDoc(clienteRef);
                if (!clienteSnap.exists()) {
                    showAlert('Cliente non trovato', 'error');
                    return;
                }
                const cliente = clienteSnap.data();

                if (!cliente.email) {
                    showAlert('Errore: email cliente non disponibile', 'error');
                    return;
                }

                // Genera link accettazione
                const baseUrl = window.location.origin + window.location.pathname.replace(/\/[^/]*$/, '');
                const accettazioneUrl = `${baseUrl}/accetta-preventivo-standalone.html?token=${preventivo.tokenAccettazione}`;

                // Formatta dati per email
                const scadenzaFormattata = preventivo.dataScadenza
                    ? (formatDateLikeToItalianLongLocal(
                        preventivo.dataScadenza.toDate ? preventivo.dataScadenza.toDate() : preventivo.dataScadenza
                      ) || '-')
                    : '-';
                
                const totaleImponibile = `€ ${(preventivo.totale || 0).toFixed(2)}`;
                const totaleIva = `€ ${((preventivo.totaleConIva || 0) - (preventivo.totale || 0)).toFixed(2)}`;
                const totaleConIva = `€ ${(preventivo.totaleConIva || preventivo.totale || 0).toFixed(2)}`;
                const superficieFormattata = `${(preventivo.superficie || 0).toFixed(2)}`;
                const ivaPercentuale = preventivo.iva || 22;

                // Carica nome terreno se presente
                let terrenoNome = '';
                if (preventivo.terrenoId) {
                    try {
                        const terrenoRef = doc(db, 'tenants', currentTenantId, 'terreni', preventivo.terrenoId);
                        const terrenoSnap = await getDoc(terrenoRef);
                        if (terrenoSnap.exists()) {
                            terrenoNome = terrenoSnap.data().nome || '';
                        }
                    } catch (err) {
                        console.warn('Errore caricamento terreno:', err);
                    }
                }

                // Genera link rifiuto (opzionale)
                const rifiutoUrl = `${baseUrl}/accetta-preventivo-standalone.html?token=${preventivo.tokenAccettazione}&action=rifiuta`;

                // Carica dati azienda per branding email
                let datiAzienda = {
                    nome: '',
                    logoUrl: null,
                    indirizzo: '',
                    citta: '',
                    cap: '',
                    provincia: '',
                    telefono: '',
                    email: '',
                    piva: ''
                };
                
                try {
                    const tenantRef = doc(db, 'tenants', currentTenantId);
                    const tenantSnap = await getDoc(tenantRef);
                    if (tenantSnap.exists()) {
                        const tenantData = tenantSnap.data();
                        datiAzienda = {
                            nome: tenantData.nome || '',
                            logoUrl: tenantData.logoUrl || null,
                            indirizzo: tenantData.indirizzo || '',
                            citta: tenantData.citta || '',
                            cap: tenantData.cap || '',
                            provincia: tenantData.provincia || '',
                            telefono: tenantData.telefono || '',
                            email: tenantData.email || '',
                            piva: tenantData.piva || ''
                        };
                    }
                } catch (tenantError) {
                    console.warn('Errore caricamento dati azienda:', tenantError);
                    // Continua con dati vuoti
                }

                // Prepara variabili azienda per template email (HTML generato lato server / Resend)
                // Logo URL (solo URL https — il template server costruisce <img>)
                let logoUrl = '';
                if (datiAzienda.logoUrl && datiAzienda.logoUrl.startsWith('http')) {
                    logoUrl = datiAzienda.logoUrl; // Solo URL, non HTML
                }
                
                // Nome azienda nell'header: testo semplice
                let nomeAziendaHeader = datiAzienda.nome || ''; // Assicurati che sia sempre una stringa
                
                // Nome azienda nel footer: testo semplice
                let nomeAziendaFooter = datiAzienda.nome || ''; // Assicurati che sia sempre una stringa
                
                // Debug: verifica che i dati siano caricati
                console.log('📧 Dati azienda per email:', {
                    nome: datiAzienda.nome,
                    logoUrl: logoUrl,
                    nomeAziendaHeader: nomeAziendaHeader
                });
                
                // Formatta indirizzo completo
                let indirizzoCompleto = '';
                if (datiAzienda.indirizzo) {
                    indirizzoCompleto = datiAzienda.indirizzo;
                    if (datiAzienda.citta) {
                        indirizzoCompleto += `, ${datiAzienda.citta}`;
                    }
                    if (datiAzienda.cap) {
                        indirizzoCompleto += ` ${datiAzienda.cap}`;
                    }
                }
                
                let indirizzoAziendaHtml = '';
                if (indirizzoCompleto) {
                    indirizzoAziendaHtml = `<p style="margin: 0 0 5px 0; color: #666; font-size: 12px;">${indirizzoCompleto}</p>`;
                }
                
                let telefonoAziendaHtml = '';
                if (datiAzienda.telefono) {
                    telefonoAziendaHtml = `<p style="margin: 0 0 5px 0; color: #666; font-size: 12px;">Tel: ${datiAzienda.telefono}</p>`;
                }
                
                let emailAziendaHtml = '';
                if (datiAzienda.email) {
                    emailAziendaHtml = `<p style="margin: 0 0 5px 0; color: #666; font-size: 12px;">Email: ${datiAzienda.email}</p>`;
                }
                
                let pivaAziendaHtml = '';
                if (datiAzienda.piva) {
                    pivaAziendaHtml = `<p style="margin: 0 0 10px 0; color: #666; font-size: 12px;">P.IVA: ${datiAzienda.piva}</p>`;
                }

                // Invio email tramite Resend (Cloud Function sendTransactionalEmail)
                let emailInviata = false;
                try {
                    const emailParams = {
                        ragione_sociale: cliente.ragioneSociale || 'Cliente',
                        numero_preventivo: preventivo.numero || '',
                        tipo_lavoro: preventivo.tipoLavoro || '',
                        coltura: preventivo.coltura || '',
                        tipo_campo: preventivo.tipoCampo === 'pianura' ? 'Pianura' :
                            preventivo.tipoCampo === 'collina' ? 'Collina' :
                            preventivo.tipoCampo === 'montagna' ? 'Montagna' : preventivo.tipoCampo || '',
                        superficie: superficieFormattata,
                        terreno_nome: terrenoNome,
                        totale_imponibile: totaleImponibile,
                        iva_percentuale: ivaPercentuale,
                        totale_iva: totaleIva,
                        totale_con_iva: totaleConIva,
                        scadenza: scadenzaFormattata,
                        link_accettazione: accettazioneUrl,
                        link_rifiuto: rifiutoUrl,
                        note: preventivo.note || '',
                        logo_url: logoUrl || '',
                        nome_azienda: nomeAziendaHeader || '',
                        nome_azienda_footer: nomeAziendaFooter || '',
                        indirizzo_azienda: datiAzienda.indirizzo || '',
                        citta_azienda: datiAzienda.citta || '',
                        cap_azienda: datiAzienda.cap || '',
                        telefono_azienda: datiAzienda.telefono || '',
                        email_azienda: datiAzienda.email || '',
                        piva_azienda: datiAzienda.piva || ''
                    };

                    await sendTransactionalEmail({
                        type: 'preventivo',
                        tenantId: currentTenantId,
                        to: cliente.email.trim(),
                        ...emailParams
                    });
                    console.log('✅ Email inviata con successo (Resend)');
                    emailInviata = true;
                } catch (emailError) {
                    console.error('Errore invio email:', emailError);
                    showLinkModal(accettazioneUrl, cliente.email, preventivo.numero);
                }

                // Aggiorna stato preventivo
                await updateDoc(preventivoRef, {
                    stato: 'inviato',
                    dataInvio: serverTimestamp()
                });

                if (emailInviata) {
                    showAlert('✅ Preventivo inviato via email con successo!', 'success');
                } else {
                    showAlert('⚠️ Preventivo aggiornato, ma errore nell\'invio email. Usa il link mostrato nel modal.', 'error');
                }
                
                await loadPreventivi();
            } catch (error) {
                console.error('Errore invio preventivo:', error);
                showAlert('Errore: ' + error.message, 'error');
            }
        };

        // Mostra modal con link accettazione (fallback)
        function showLinkModal(link, email, numeroPreventivo) {
            const modal = document.createElement('div');
            modal.style.cssText = 'position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 10000; display: flex; align-items: center; justify-content: center;';

                    </div>
                    <button onclick="this.closest('div[style*=\"position: fixed\"]').remove();" style="width: 100%; padding: 10px; background: #6c757d; color: white; border: none; border-radius: 6px; cursor: pointer;">Chiudi</button>

        // Accetta preventivo (manager) - rendi globale per accesso da HTML
        window.accettaPreventivoManager = async function(preventivoId) {
            try {
                if (!currentTenantId) {
                    showAlert('Errore: nessun tenant disponibile', 'error');
                    return;
                }

                const preventivoRef = doc(db, 'tenants', currentTenantId, 'preventivi', preventivoId);
                await updateDoc(preventivoRef, {
                    stato: 'accettato_manager',
                    dataAccettazione: serverTimestamp()
                });
                
                showAlert('Preventivo accettato con successo', 'success');
                await loadPreventivi();
            } catch (error) {
                console.error('Errore accettazione preventivo:', error);
                showAlert('Errore: ' + error.message, 'error');
            }
        }

        /** Tony (widget): invio email o accettazione manager dalla lista — stessa logica dei pulsanti */
        window.tonyPreventivoListAction = async function (params) {
            const action = params && params.action;
            const preventivoId = params && params.preventivoId;
            if (!preventivoId || !action) {
                return { ok: false, message: 'Parametri azione mancanti.' };
            }
            const prev = preventivi.find(function (pr) { return pr.id === preventivoId; });
            if (!prev) {
                return { ok: false, message: 'Preventivo non trovato nell\'elenco. Aggiorna la pagina e riprova.' };
            }
            if (action === 'invia') {
                if (prev.stato !== 'bozza') {
                    return { ok: false, message: 'Solo le bozze possono essere inviate per email.' };
                }
                await window.inviaPreventivo(preventivoId);
                return { ok: true, message: 'Ho eseguito l\'invio del preventivo per email.' };
            }
            if (action === 'accetta_manager') {
                if (prev.stato !== 'bozza' && prev.stato !== 'inviato') {
                    return { ok: false, message: 'Questo preventivo non può essere accettato dal manager nello stato attuale.' };
                }
                await window.accettaPreventivoManager(preventivoId);
                return { ok: true, message: 'Ho registrato l\'accettazione del preventivo.' };
            }
            return { ok: false, message: 'Azione non supportata.' };
        };

        // Rifiuta preventivo - rendi globale per accesso da HTML

                const preventivoRef = doc(db, 'tenants', currentTenantId, 'preventivi', preventivoId);

                    stato: 'rifiutato'

                showAlert('Preventivo rifiutato', 'success');

            } catch (error) {
                console.error('Errore rifiuto preventivo:', error);
                showAlert('Errore: ' + error.message, 'error');
            }

        // Pianifica preventivo (crea lavoro) - rendi globale per accesso da HTML
        window.pianificaPreventivo = async function(preventivoId) {
            const preventivo = preventivi.find(p => p.id === preventivoId);
            if (!preventivo) {
                showAlert('Preventivo non trovato', 'error');
                return;
            }

            if (preventivo.stato !== 'accettato_email' && preventivo.stato !== 'accettato_manager') {
                showAlert('Preventivo non può essere pianificato. Deve essere prima accettato.', 'error');
                return;
            }

            if (!confirm(`Creare un lavoro da questo preventivo?\n\nCliente: ${clienti.find(c => c.id === preventivo.clienteId)?.ragioneSociale || 'N/A'}\nTipo: ${preventivo.tipoLavoro} - ${preventivo.coltura}\nSuperficie: ${preventivo.superficie} ha`)) {
                return;
            }

            try {
                if (!currentTenantId) {
                    showAlert('Errore: nessun tenant disponibile', 'error');
                    return;
                }

                // Carica terreno se specificato
                let terrenoNome = 'Terreno Cliente';
                if (preventivo.terrenoId) {
                    try {
                        const terrenoDoc = await getDoc(doc(db, 'tenants', currentTenantId, 'terreni', preventivo.terrenoId));
                        if (terrenoDoc.exists()) {
                            terrenoNome = terrenoDoc.data().nome || terrenoNome;
                        }
                    } catch (e) {
                        console.warn('Errore caricamento terreno:', e);
                    }
                }

                // Crea nome lavoro
                const cliente = clienti.find(c => c.id === preventivo.clienteId);
                const nomeLavoro = `${preventivo.tipoLavoro} - ${preventivo.coltura}${cliente ? ` (${cliente.ragioneSociale})` : ''}`;

                // Calcola data inizio (usa data prevista se disponibile, altrimenti oggi)
                let dataInizio = new Date();
                if (preventivo.dataPrevista?.toDate) {
                    dataInizio = preventivo.dataPrevista.toDate();
                } else if (preventivo.dataPrevista instanceof Date) {
                    dataInizio = preventivo.dataPrevista;
                }

                // Crea lavoro con stato "da_pianificare"
                const lavoroData = {
                    nome: nomeLavoro,
                    terrenoId: preventivo.terrenoId || null,
                    tipoLavoro: preventivo.tipoLavoro,
                    clienteId: preventivo.clienteId,
                    preventivoId: preventivo.id,
                    dataInizio: Timestamp.fromDate(dataInizio),
                    durataPrevista: 1, // Default, manager modificherà
                    stato: 'da_pianificare',
                    note: `Lavoro creato da preventivo ${preventivo.numero}.\n${preventivo.note || ''}`.trim(),
                    creatoDa: currentUser.uid,
                    createdAt: serverTimestamp(),
                    updatedAt: serverTimestamp()
                };

                // Salva lavoro
                const lavoroRef = await addDoc(collection(db, 'tenants', currentTenantId, 'lavori'), lavoroData);
                const lavoroId = lavoroRef.id;

                // Aggiorna preventivo
                await updateDoc(doc(db, 'tenants', currentTenantId, 'preventivi', preventivoId), {
                    stato: 'pianificato',
                    lavoroId: lavoroId,
                    updatedAt: serverTimestamp()
                });

                showAlert('Lavoro creato con successo! Ora puoi completare la pianificazione dalla pagina Gestione Lavori.', 'success');
                await loadPreventivi();
            } catch (error) {
                console.error('Errore creazione lavoro:', error);
                showAlert('Errore: ' + error.message, 'error');
            }
        }

        // Elimina preventivo - rendi globale per accesso da HTML
        window.deletePreventivoConfirm = async function(preventivoId) {
            const preventivo = preventivi.find(p => p.id === preventivoId);
            if (!preventivo) return;

            if (!currentTenantId) {
                showAlert('Errore: nessun tenant disponibile', 'error');
                return;
            }

            if (preventivo.lavoroId) {
                showAlert('Impossibile eliminare: preventivo ha un lavoro associato', 'error');
                return;
            }

            if (!confirm(`Sei sicuro di voler eliminare il preventivo "${preventivo.numero}"?`)) {
                return;
            }

            try {
                await deleteDoc(doc(db, 'tenants', currentTenantId, 'preventivi', preventivoId));
                showAlert('Preventivo eliminato con successo', 'success');
                await loadPreventivi();
            } catch (error) {
                console.error('Errore eliminazione preventivo:', error);
                showAlert('Errore: ' + error.message, 'error');
            }
        }

        // Utility functions
        function showAlert(message, type = 'info') {
            const container = document.getElementById('alert-container');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            container.innerHTML = '';
            container.appendChild(alert);
            
            setTimeout(() => {
                alert.remove();
            }, 5000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
