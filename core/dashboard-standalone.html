        /**
         * Allinea tenant-service al documento utente (membership / tenantId deprecato).
         * Dopo registrazione invito spesso c'è solo tenantMemberships: senza setCurrentTenantId,
         * getStatisticheVigneto e altri servizi vedono "Nessun tenant corrente".
         */
        async function resolveCurrentTenantId(userData) {
            if (!userData) return null;
            const { getCurrentTenantId, setCurrentTenantId } = await import('./services/tenant-service.js');
            let tid = getCurrentTenantId();
            if (tid) return tid;
            if (userData.tenantId) {
                setCurrentTenantId(userData.tenantId);
                return userData.tenantId;
            }
            if (userData.tenantMemberships && typeof userData.tenantMemberships === 'object') {
                const entries = Object.entries(userData.tenantMemberships);
                for (const [id, m] of entries) {
                    if (m && m.stato === 'attivo') {
                        setCurrentTenantId(id);
                        return id;
                    }
                }
                const def = entries.find(([, m]) => m && m.tenantIdPredefinito);
                if (def) {
                    setCurrentTenantId(def[0]);
                    return def[0];
                }
                if (entries.length === 1) {
                    const id = entries[0][0];
                    setCurrentTenantId(id);
                    return id;
                }
                if (entries.length > 1) {
                    const id = entries[0][0];
                    setCurrentTenantId(id);
                    return id;
                }
            }
            return null;
        }

        /** Ruoli che vedono il briefing Tony su scorte/scadenze/guasti (solo manager dashboard). */
        function tonyGlobalBriefingRoles(ruoli) {

        }

        function tonyHasTonyAdvancedModule(modules) {
            var hasTony = function(arr) {
                return Array.isArray(arr) && arr.some(function(m) {
                    return String(m).toLowerCase() === 'tony';
                });
            };
            if (hasTony(modules)) return true;
            if (window.__gfvTenantData && hasTony(window.__gfvTenantData.modules)) return true;
            try {
                if (typeof window.__tonyIsAdvancedActive === 'function' && window.__tonyIsAdvancedActive()) {
                    return true;
                }
            } catch (e) { /* ignore */ }
            return false;
        }

        /** Voce / briefing automatico in dashboard solo con modulo Tony Avanzato attivo sul tenant (come il widget). */
        function tonyDashboardBriefingVoiceAllowed(modules) {
            try {
                if (typeof window.__tonyCheckModuleStatus === 'function') {
                    window.__tonyCheckModuleStatus();
                }
                if (tonyHasTonyAdvancedModule(modules)) return true;
                var ctx = window.Tony && window.Tony.context;
                if (!ctx) return false;
                var mods = [];
                if (ctx.dashboard && Array.isArray(ctx.dashboard.moduli_attivi)) {
                    mods = ctx.dashboard.moduli_attivi;
                } else if (ctx.dashboard && ctx.dashboard.info_azienda && Array.isArray(ctx.dashboard.info_azienda.moduli_attivi)) {
                    mods = ctx.dashboard.info_azienda.moduli_attivi;
                } else if (ctx.info_azienda && Array.isArray(ctx.info_azienda.moduli_attivi)) {
                    mods = ctx.info_azienda.moduli_attivi;
                } else if (Array.isArray(ctx.moduli_attivi)) {
                    mods = ctx.moduli_attivi;
                }
                return tonyHasTonyAdvancedModule(mods);
            } catch (e) {
                return false;
            }
        }

        function tonyDashboardPrefetchBriefingVoice(text) {
            var t = String(text || '').trim();
            if (!t) return;
            try {
                if (typeof window.__tonyWarmTTS === 'function') window.__tonyWarmTTS();
            } catch (eW) { /* ignore */ }
            try {
                if (typeof window.__tonyPrefetchTTS === 'function') window.__tonyPrefetchTTS(t);
            } catch (eP) { /* ignore */ }
        }

        /** Mobile / touch (solo fallback testo se voce non disponibile). */
        function tonyDashboardIsMobile() {
            try {
                if (window.matchMedia && window.matchMedia('(pointer: coarse)').matches) return true;
                if (/Android|iPhone|iPad|iPod|Mobi/i.test(navigator.userAgent || '')) return true;
            } catch (e) { /* ignore */ }
            return false;
        }

        function tonyDashboardDeliverBriefing(fullText, speakAllowed, onDelivered) {
            var msg = String(fullText || '').trim();
            if (!msg) return;
            var useVoice = !!speakAllowed;
            // Con voce attiva apri anche su desktop (testo + TTS allineati); senza voce solo mobile.
            var openPanel = useVoice || tonyDashboardIsMobile();
            if (useVoice) {
                tonyDashboardPrefetchBriefingVoice(msg);
            }
            var attempts = 0;
            function markDelivered() {
                if (typeof onDelivered === 'function') onDelivered();
            }
            function tryDeliver() {
                if (typeof window.__tonyDisplayProactive === 'function') {
                    window.__tonyDisplayProactive(msg, {
                        speak: useVoice,
                        openPanel: openPanel,
                        dashboardBriefing: true
                    });
                    markDelivered();
                    return;
                }
                if (useVoice && window.Tony && typeof window.Tony.speak === 'function' &&
                    typeof window.Tony.isReady === 'function' && window.Tony.isReady()) {
                    window.Tony.speak(msg);
                    if (openPanel && typeof window.__tonyOpenChatPanel === 'function') {
                        window.__tonyOpenChatPanel();
                    }
                    markDelivered();
                    return;
                }
                attempts += 1;
                if (attempts < 50) {
                    setTimeout(tryDeliver, 300);
                    return;
                }
                console.warn('[Tony] briefing dashboard: widget non pronto, messaggio omesso:', msg.slice(0, 80));
            }
            tryDeliver();
        }

        // Carica contesto vigneto per Tony (produzione per anno) se modulo attivo
        // tenantIdExplicit: obbligatorio per evitare race con tenant-service dopo reload / membership-only
        async function loadTonyVignetoContext(availableModules, tenantIdExplicit) {
            if (!availableModules || !availableModules.includes('vigneto') || !window.Tony || !window.Tony.isReady()) return;
            try {
                const { setCurrentTenantId, getCurrentTenantId } = await import('./services/tenant-service.js');
                if (tenantIdExplicit) {
                    setCurrentTenantId(tenantIdExplicit);
                }
                if (!getCurrentTenantId()) {
                    return;
                }
                const { getStatisticheVigneto } = await import('../modules/vigneto/services/vigneto-statistiche-service.js');
                const annoCorrente = new Date().getFullYear();
                const anni = [annoCorrente, annoCorrente - 1, annoCorrente - 2];
                const produzionePerAnno = {};
                let numeroVigneti = 0;
                for (const anno of anni) {
                    const stats = await getStatisticheVigneto(null, anno);
                    produzionePerAnno[anno] = {
                        produzioneTotaleQli: stats.produzioneTotaleQli ?? 0,
                        numeroVendemmie: stats.numeroVendemmie ?? 0,
                        resaMediaQliHa: stats.resaMediaQliHa
                    };
                    if (anno === annoCorrente && stats.numeroVigneti != null) numeroVigneti = stats.numeroVigneti;
                }
                const riepilogo = anni.map(a => {
                    const q = produzionePerAnno[a].produzioneTotaleQli;
                    return `Nel ${a}: ${q} qli di uva` + (produzionePerAnno[a].numeroVendemmie ? ` (${produzionePerAnno[a].numeroVendemmie} vendemmie)` : '');
                }).join('. ');
                window.Tony.setContext('vigneto', {
                    produzione_per_anno: produzionePerAnno,
                    numero_vigneti: numeroVigneti,
                    riepilogo_produzione: riepilogo
                });
            } catch (e) {
                console.warn('[Tony] Caricamento contesto vigneto non disponibile:', e);
            }
        }

        /**
         * Scansione globale per Tony: prodotti sotto scorta, scadenze urgenti, guasti aperti.
         * Con modulo meteo + Tony Avanzato: consigli operativi meteo (cache CF).
         * Solo per manager/amministratore (promemoria operativi d'azienda).
         * Imposta window.tonyGlobalBriefing e Tony.setContext('globalStatus', ...).
         */
        async function checkGlobalStatus(tenantId, ruoliNormalizzati, availableModules, countsSnapshot) {
            if (!tenantId) return;
            if (!tonyGlobalBriefingRoles(ruoliNormalizzati)) {
                return;
            }
            try {
                const mods = Array.isArray(availableModules) ? availableModules : [];
                const hasMagazzino = mods.includes('magazzino');
                const hasParcoMacchine = mods.includes('parcoMacchine');
                const snap =
                    (await awaitDashboardCountsSnapshot(tenantId)) ||
                    countsSnapshot ||
                    getDashboardCountsSnapshot();
                // Attendi ore da validare se ancora in refresh (stesso fetch lavori, no N+1).
                if (snap && snap.oreRefreshPromise) {
                    try {
                        await snap.oreRefreshPromise;
                    } catch (eOre) {
                        console.warn('[Tony] oreDaValidare pending:', eOre);
                    }
                }
                const snapReady = getDashboardCountsSnapshot() || snap;
                const meteoBriefingPromise =
                    tonyMeteoBriefingAllowed(mods, ruoliNormalizzati)
                        ? loadTonyMeteoBriefingData(tenantId).catch(function(e) {
                            console.warn('[Tony] meteo briefing:', e);
                            return null;
                        })
                        : Promise.resolve(null);

                const hasManodopera = mods.includes('manodopera');
                const sottoScorta = hasMagazzino && snapReady ? snapReady.sottoScorta || 0 : 0;
                const prodottiDaCompletare =
                    hasMagazzino && snapReady ? snapReady.prodottiDaCompletare || 0 : 0;
                const scadenzeUrgenti = hasParcoMacchine && snapReady ? snapReady.scadenzeUrgenti || 0 : 0;
                const guastiAperti = hasParcoMacchine && snapReady ? snapReady.guastiAperti || 0 : 0;
                const oreDaValidare = hasManodopera && snapReady ? snapReady.oreDaValidare || 0 : 0;
                const meteoBriefing = await meteoBriefingPromise;

                window.tonyMeteoBriefing = meteoBriefing || null;
                window.tonyGlobalBriefing = {
                    sottoScorta: sottoScorta,
                    prodottiDaCompletare: prodottiDaCompletare,
                    oreDaValidare: oreDaValidare,
                    lavoriDaApprovare: snapReady ? snapReady.lavoriDaApprovare || 0 : 0,
                    lavoriSospesiDaRiprendere: snapReady
                        ? snapReady.lavoriSospesiDaRiprendere || 0
                        : 0,
                    lavoriInCorso: snapReady && snapReady.operativitaOggi
                        ? snapReady.operativitaOggi.inCorso || 0
                        : 0,
                    lavoriDaPianificare: snapReady ? snapReady.daPianificare || 0 : 0,
                    affittiUrgenti: snapReady ? snapReady.affittiUrgenti || 0 : 0,
                    scadenzeUrgenti: scadenzeUrgenti,
                    guastiAperti: guastiAperti,
                    summarySottoScorta: snapReady && snapReady.summarySottoScorta ? snapReady.summarySottoScorta : '',
                    summaryGuasti: snapReady && snapReady.summaryGuasti ? snapReady.summaryGuasti : '',
                    summaryScadenze: snapReady && snapReady.summaryScadenze ? snapReady.summaryScadenze : '',
                    meteo: meteoBriefing,
                    meteoConsigliCount: meteoBriefing && meteoBriefing.consigliCount ? meteoBriefing.consigliCount : 0,
                    availableModules: mods.slice(),
                    hasMagazzino: hasMagazzino,
                    hasParcoMacchine: hasParcoMacchine,
                    hasManodopera: hasManodopera,
                };
                if (window.Tony && typeof window.Tony.setContext === 'function') {
                    window.Tony.setContext('globalStatus', window.tonyGlobalBriefing);
                    if (meteoBriefing) {
                        window.Tony.setContext('meteoBriefing', meteoBriefing);
                    }
                }

                const collected = collectProactiveSignals(
                    { availableModules: mods, roles: ruoliNormalizzati, hubId: 'dashboard' },
                    buildRawProactiveCounts({
                        snap: snapReady,
                        sottoScorta: sottoScorta,
                        prodottiDaCompletare: prodottiDaCompletare,
                        oreDaValidare: oreDaValidare,
                        lavoriDaApprovare: snapReady ? snapReady.lavoriDaApprovare || 0 : 0,
                        lavoriSospesiDaRiprendere: snapReady
                            ? snapReady.lavoriSospesiDaRiprendere || 0
                            : 0,
                        lavoriInCorso: snapReady && snapReady.operativitaOggi
                            ? snapReady.operativitaOggi.inCorso || 0
                            : 0,
                        lavoriDaPianificare: snapReady ? snapReady.daPianificare || 0 : 0,
                        affittiUrgenti: snapReady ? snapReady.affittiUrgenti || 0 : 0,
                        scadenzeUrgenti: scadenzeUrgenti,
                        guastiAperti: guastiAperti,
                        meteoConsigliCount:
                            meteoBriefing && meteoBriefing.consigliCount ? meteoBriefing.consigliCount : 0,
                    })
                );
                const tonyBriefingEnabled = tonyHasTonyAdvancedModule(mods);
                // §15.5: max 1 pieno/fascia; §15.6: messaggi da catalogo segnali.
                if (!window.Tony || !tonyBriefingEnabled) {
                    return;
                }
                var storage = null;
                try { storage = window.localStorage; } catch (eLs) { storage = null; }
                var nowBriefing = new Date();
                var fingerprint = collected.fingerprint;
                var prevState = loadProactiveBriefingState(storage, tenantId, nowBriefing);
                var decision = decideProactiveBriefingAction(prevState, nowBriefing, fingerprint);
                if (decision.action === 'silence') {
                    return;
                }

                var greeting = (typeof window.getFriendlyGreeting === 'function') ? window.getFriendlyGreeting() : 'Buongiorno!';
                var followUp =
                    decision.action === 'delta'
                        ? pickProactiveOpenFollowUpFromDelta(decision.worsened)
                        : pickProactiveOpenFollowUp(collected.opsActive);
                var speakCoreOps = formatProactiveOpsAttentionSnippet(collected.opsActive, followUp);
                var speakMeteo =
                    meteoBriefing && meteoBriefing.proactiveText
                        ? ' ' + meteoBriefing.proactiveText
                        : '';
                var briefingText = '';
                var openOffer = createProactiveOpenOffer(followUp);
                if (decision.action === 'delta') {
                    briefingText = (
                        formatProactiveDeltaMessage(decision.worsened) +
                        formatProactiveOpenFollowUpOffer(followUp)
                    ).trim();
                } else if (collected.opsActive.length > 0) {
                    briefingText = (greeting + speakCoreOps + speakMeteo).trim();
                } else if (meteoBriefing && meteoBriefing.proactiveText) {
                    briefingText = String(meteoBriefing.proactiveText).trim();
                    openOffer = null;
                } else if (decision.allowIdleFull) {
                    var weatherIdle = meteoBriefing && meteoBriefing.weatherSummary
                        ? ' ' + meteoBriefing.weatherSummary
                        : ' Tutto sotto controllo in azienda.';
                    briefingText = greeting + weatherIdle + ' Chiedimi un riassunto dettagliato quando vuoi.';
                    openOffer = null;
                }

                if (!briefingText) {
                    return;
                }

                // Persisti subito (anti-spam): se l'utente naviga via prima del timeout non riparte un secondo pieno.
                saveProactiveBriefingState(storage, tenantId, decision.nextState);
                window.tonyDashboardBriefingFired = true;
                window.tonyMeteoBriefingFired = true;
                window.__tonyProactiveOpenOffer = openOffer;

                var voiceAllowed = tonyDashboardBriefingVoiceAllowed(mods);
                if (voiceAllowed) {
                    tonyDashboardPrefetchBriefingVoice(briefingText);
                }
                var delayMs = decision.action === 'delta' ? 2500 : 3000;
                setTimeout(function() {
                    tonyDashboardDeliverBriefing(briefingText, voiceAllowed, null);
                }, delayMs);
            } catch (e) {
                console.warn('[Tony] checkGlobalStatus:', e);
            }
        }

        async function finishDashboardLoad(availableModules, userDataNormalized, currentTenantId, user) {
            const planId = window.__gfvSubscriptionPlanId || 'base';
            const hasTonyModule = Array.isArray(availableModules) && availableModules.some(function(m) {

        function scheduleTonyDashboardDeferred(availableModules, userDataNormalized, currentTenantId) {
            function runTonyDashboardDeferred() {
                if (window.__tonyGlobalStatusRan) return;
                if (!window.Tony || !Tony.isReady()) return false;
                window.__tonyGlobalStatusRan = true;
                Promise.all([
                    dashboardPerfAsync('tony.vignetoContext', () => loadTonyVignetoContext(availableModules, currentTenantId)),
                    dashboardPerfAsync('tony.checkGlobalStatus', () =>
                        checkGlobalStatus(currentTenantId, userDataNormalized.ruoli, availableModules, getDashboardCountsSnapshot()))
                ]).catch(function(e) {
                    console.warn('[Tony] deferred dashboard briefing:', e);
                });
                return true;
            }
            var attempts = 0;
            function pollUntilTonyReady() {
                if (runTonyDashboardDeferred()) return;
                attempts++;
                if (attempts < 60) {
                    setTimeout(pollUntilTonyReady, 500);
                } else {
                    console.warn('[Tony] briefing dashboard: timeout attesa Tony.isReady()');
                }
            }
            window.addEventListener('tony-widget-ready', function() {
                pollUntilTonyReady();
            }, { once: true });
            if (typeof requestIdleCallback === 'function') {
                requestIdleCallback(pollUntilTonyReady, { timeout: 3000 });
            } else {
                setTimeout(pollUntilTonyReady, 500);
            }
        }

        /** Ruolo campo (operaio/caposquadra) senza manager/admin: indice documentazione ridotto. */
        function getFieldDocumentationRole(userData) {
            if (!userData || !Array.isArray(userData.ruoli)) return '';
            const roles = userData.ruoli.map((r) => String(r || '').toLowerCase());
            if (roles.includes('manager') || roles.includes('amministratore')) return '';
            if (roles.includes('caposquadra')) return 'caposquadra';
            if (roles.includes('operaio')) return 'operaio';
            return '';
        }

        /** Link «Guide»: moduli tenant + eventuale fieldRole per operaio/caposquadra (solo Core / Manodopera / Tony). */
        function updateDocumentationGuideLink(availableModules, userData) {
            const a = document.getElementById('dashboard-documentation-guide-link');
            if (!a) return;
            const base = '../documentazione-utente/index.html';
            try {
                const list = Array.isArray(availableModules) ? availableModules : [];
                const normalized = list
                    .map((m) => (m == null ? '' : String(m).trim()))
                    .filter(Boolean);
                const fieldRole = getFieldDocumentationRole(userData || {});
                const qs = new URLSearchParams();
                if (fieldRole) {
                    qs.set('fieldRole', fieldRole);
                }
                if (normalized.length) {
                    qs.set('mods', normalized.join(','));
                    a.href = qs.toString() ? `${base}?${qs.toString()}` : base;
                    return;
                }
                if (fieldRole) {
                    a.href = `${base}?${qs.toString()}`;
                    return;
                }
                a.href = base;
            } catch (_) {
                a.href = base;
            }
        }

        // Verifica autenticazione e carica dashboard
        // Traccia l'utente previsto per questa scheda (per gestire cambio sessione)
        let expectedUserId = sessionStorage.getItem('gfv_expected_user_id');
        
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                await awaitAuthStateReady();
                user = auth.currentUser;
            }
            if (!user) {
                user = await ensureSimulatorSession(auth);
            }
            if (!user) {
                // Non autenticato, redirect a login
                sessionStorage.removeItem('gfv_expected_user_id');
                window.location.href = loginPageUrl();
                return;
            }
            
            // Se questa scheda aveva un utente previsto e ora è cambiato, gestisci il cambio
            if (expectedUserId && expectedUserId !== user.uid) {
                // L'utente è cambiato (probabilmente un'altra scheda ha fatto login)
                // Se questa scheda non è appena stata usata per registrazione, fai logout
                const justRegistered = sessionStorage.getItem('gfv_user_just_registered');
                if (!justRegistered) {
                    const { signOut } = await import('./services/firebase-service.js');
                    await signOut(auth);
                    sessionStorage.removeItem('gfv_expected_user_id');
                    window.location.href = loginPageUrl();
                    return;
                } else {
                    // Questa scheda è appena stata usata per registrazione, aggiorna l'utente previsto
                    expectedUserId = user.uid;
                    sessionStorage.setItem('gfv_expected_user_id', user.uid);
                    sessionStorage.removeItem('gfv_user_just_registered');
                }
            } else if (!expectedUserId) {
                // Prima volta che carichiamo questa scheda, salva l'utente previsto
                expectedUserId = user.uid;
                sessionStorage.setItem('gfv_expected_user_id', user.uid);
            }

            dashboardPerfBegin('dashboard');

            // Carica dati utente
            // Verifica se l'utente si è appena registrato
            const justRegistered = sessionStorage.getItem('gfv_user_just_registered') === 'true';
            const expectedTenantId = sessionStorage.getItem('gfv_expected_tenant_id');
            if (justRegistered) {
                await new Promise(resolve => setTimeout(resolve, 2000));
            }
            
            try {
                const userDocRef = doc(db, 'users', user.uid);
                const userDoc = await dashboardPerfAsync('auth.userDoc', () => getDoc(userDocRef));

                if (!userDoc.exists()) {
                    // Il documento utente non esiste, verifica prima se esiste già un documento con la stessa email
                    console.warn('⚠️ Documento utente non trovato per UID, verifico se esiste già un documento con la stessa email...');
                    try {
                        // PRIMA VERIFICA: Cerca se esiste già un documento con la stessa email (per evitare duplicati)
                        const existingUsersQuery = query(
                            collection(db, 'users'),
                            where('email', '==', user.email)
                        );
                        const existingUsersSnapshot = await getDocs(existingUsersQuery);
                        
                        if (!existingUsersSnapshot.empty) {
                            // Trovato un documento esistente con la stessa email ma UID diverso
                            // Questo è un documento orfano o duplicato - aggiornalo con il nuovo UID
                            const existingDoc = existingUsersSnapshot.docs[0];
                            const existingData = existingDoc.data();
                            console.warn('⚠️ Trovato documento esistente con stessa email ma UID diverso:', existingDoc.id);
                            console.warn('⚠️ Aggiorno il documento esistente con il nuovo UID:', user.uid);
                            
                            // Aggiorna il documento esistente con il nuovo UID
                            await setDoc(userDocRef, {
                                ...existingData,
                                id: user.uid,
                                email: user.email,
                                ultimoAccesso: serverTimestamp(),
                                isOnline: true,
                                lastSeen: serverTimestamp()
                            });
                            
                            // Elimina il vecchio documento orfano
                            await deleteDoc(doc(db, 'users', existingDoc.id));
                            
                            // Ricarica il documento appena creato per continuare con il flusso normale
                            const updatedUserDoc = await getDoc(userDocRef);
                            if (!updatedUserDoc.exists()) {
                                throw new Error('Errore: documento non creato correttamente dopo merge');
                            }
                        } else {
                            // Nessun documento esistente con questa email, procedi con la creazione normale
                            // IMPORTANTE: Se l'utente non viene dalla registrazione, NON creare documento vuoto
                            // L'utente deve completare la registrazione prima
                            const justRegistered = sessionStorage.getItem('gfv_user_just_registered') === 'true';
                            
                            if (!justRegistered) {

                                alert('Errore: documento utente non trovato. Completa la registrazione.');
                                window.location.href = '../auth/registrazione-standalone.html';
                                return;
                            }
                            
                            // Attendi un breve momento per evitare race condition con registrazione appena completata
                            await new Promise(resolve => setTimeout(resolve, 2000));
                            
                            // Ricarica il documento utente (dovrebbe essere stato creato dalla registrazione)
                            const retryUserDoc = await getDoc(userDocRef);
                            if (!retryUserDoc.exists()) {

                                await auth.signOut();
                                alert('Errore: documento utente non trovato. Riprova la registrazione.');

                                return;
                            }
                            
                            // Se il documento esiste ora, continua con il flusso normale

                            // Ottieni tenant corrente e ruoli filtrati per questo tenant
                            const { getUserRolesForTenant } = await import('./services/tenant-service.js');
                            const currentTenantId = await dashboardPerfAsync('auth.resolveTenant', () => resolveCurrentTenantId(userData));
                            
                            // Ottieni ruoli per il tenant corrente (non tutti i ruoli)
                            let rolesForCurrentTenant = [];

                                rolesForCurrentTenant = await dashboardPerfAsync('auth.tenantRoles', () =>
                                    getUserRolesForTenant(currentTenantId, user.uid));
                            }
                            
                            // Se non ci sono ruoli per il tenant corrente, usa ruoli deprecati come fallback
                            if (rolesForCurrentTenant.length === 0) {
                                rolesForCurrentTenant = userData.ruoli || [];
                            }
                            
                            const normalizedRoles = normalizeRoles(rolesForCurrentTenant);
                            
                            const userDataNormalized = {
                                ...userData,
                                ruoli: normalizedRoles,
                                tenantId: currentTenantId // Usa tenant corrente invece di deprecato
                            };
                            
                            // Carica moduli disponibili dal tenant CORRENTE (non deprecato)
                            let availableModules = [];
                            let tenantDataSnapshot = null;
                            if (currentTenantId) {
                                try {
                                    const tenantDoc = await dashboardPerfAsync('auth.tenantDoc', () =>
                                        getDoc(doc(db, 'tenants', currentTenantId)));
                                    if (tenantDoc.exists()) {
                                        tenantDataSnapshot = tenantDoc.data();
                                        const { resolveEffectiveModules } = await import('./utils/module-access-resolver.js');
                                        availableModules = resolveEffectiveModules(tenantDataSnapshot);
                                    }
                                } catch (e) {
                                    console.warn('Errore caricamento moduli tenant:', e);
                                }
                            }
                            const planNormalized = normalizeGfvPlanId(tenantDataSnapshot ? (tenantDataSnapshot.plan || tenantDataSnapshot.piano) : 'base');
                            window.__gfvTenantData = Object.assign({}, tenantDataSnapshot || {}, {
                                modules: availableModules,
                                plan: planNormalized,
                                piano: planNormalized
                            });
                            window.__gfvSubscriptionPlanId = planNormalized;
                            try { window.dispatchEvent(new CustomEvent('gfv-subscription-plan', { detail: { planId: planNormalized } })); } catch (eP) {}
                            
                            // Routing mobile per ruoli campo (operaio/caposquadra)
                            if (redirectToFieldWorkspaceIfNeeded(userDataNormalized, availableModules)) {
                                return;
                            }

                            // Renderizza dashboard
                            await renderDashboard(userDataNormalized, availableModules);
                            await finishDashboardLoad(availableModules, userDataNormalized, currentTenantId, user);
                            return; // Esci qui per non eseguire il codice sotto
                        }
                    } catch (error) {
                        console.error('❌ Errore creazione documento utente:', error);
                        // Continua con il flusso di errore
                    }
                } else {
                    // Se arriviamo qui, significa che il documento esiste
                    const userData = userDoc.data();
                    
                    // Ottieni tenant corrente e ruoli filtrati per questo tenant
                    const { getUserRolesForTenant } = await import('./services/tenant-service.js');
                    const currentTenantId = await dashboardPerfAsync('auth.resolveTenant', () => resolveCurrentTenantId(userData));
                    
                    // Ottieni ruoli per il tenant corrente (non tutti i ruoli)
                    let rolesForCurrentTenant = [];
                    if (currentTenantId) {
                        rolesForCurrentTenant = await dashboardPerfAsync('auth.tenantRoles', () =>
                            getUserRolesForTenant(currentTenantId, user.uid));
                    }
                    
                    // Se non ci sono ruoli per il tenant corrente, usa ruoli deprecati come fallback
                    if (rolesForCurrentTenant.length === 0) {
                        rolesForCurrentTenant = userData.ruoli || [];
                    }
                    
                    const normalizedRoles = normalizeRoles(rolesForCurrentTenant);
                    
                    const userDataNormalized = {
                        ...userData,
                        ruoli: normalizedRoles,
                        tenantId: currentTenantId // Usa tenant corrente invece di deprecato
                    };
                    
                    // Aggiorna info utente nell'header
                    document.getElementById('user-info').textContent = 
                        `${userData.nome || ''} ${userData.cognome || ''}`.trim() || user.email;
                    
                    const rolesHTML = normalizedRoles.map(role => 
                        `<span class="role-badge">${roleNames[role] || role}</span>`
                    ).join(' ');
                    document.getElementById('user-roles').innerHTML = rolesHTML || '<span class="role-badge">Nessun ruolo</span>';
                    
                    // Aggiorna ultimo accesso
                    try {
                        await updateDoc(userDocRef, {
                            ultimoAccesso: serverTimestamp(),
                            isOnline: true,
                            lastSeen: serverTimestamp()
                        });
                    } catch (error) {
                        console.warn('Errore aggiornamento ultimo accesso:', error);
                    }
                    
                    // Aggiorna stato online ogni 30 secondi
                    if (window.gfvOnlineInterval) {
                        clearInterval(window.gfvOnlineInterval);
                    }
                    window.gfvOnlineInterval = setInterval(async () => {
                        try {
                            const currentUser = auth.currentUser;
                            if (currentUser) {
                                await updateDoc(doc(db, 'users', currentUser.uid), {
                                    lastSeen: serverTimestamp()
                                });
                            }
                        } catch (error) {
                            console.warn('Errore aggiornamento stato online:', error);
                        }
                    }, 30000);
                    
                    // Carica moduli disponibili dal tenant CORRENTE (non deprecato)
                    let availableModules = [];
                    let tenantDataSnapshot = null;
                    if (currentTenantId) {
                        try {
                            const tenantDoc = await dashboardPerfAsync('auth.tenantDoc', () =>
                                getDoc(doc(db, 'tenants', currentTenantId)));
                            if (tenantDoc.exists()) {
                                tenantDataSnapshot = tenantDoc.data();
                                const { resolveEffectiveModules } = await import('./utils/module-access-resolver.js');
                                availableModules = resolveEffectiveModules(tenantDataSnapshot);
                            }
                        } catch (error) {
                            console.warn('Errore caricamento moduli tenant:', error);
                        }
                    }
                    const planNormalized = normalizeGfvPlanId(tenantDataSnapshot ? (tenantDataSnapshot.plan || tenantDataSnapshot.piano) : 'base');
                    window.__gfvTenantData = Object.assign({}, tenantDataSnapshot || {}, {
                        modules: availableModules,
                        plan: planNormalized,
                        piano: planNormalized
                    });
                    window.__gfvSubscriptionPlanId = planNormalized;
                    try { window.dispatchEvent(new CustomEvent('gfv-subscription-plan', { detail: { planId: planNormalized } })); } catch (eP) {}
                    
                    // La visibilità del link "Invita Collaboratore" viene gestita in renderDashboard
                    // in base a se Manodopera è attivo o no
                    
                    // Gestione switch tenant (multi-tenant)
                    await dashboardPerfAsync('auth.tenantSwitch', () => setupTenantSwitch(user.uid, userDataNormalized));
                    
                    // Routing mobile per ruoli campo (operaio/caposquadra)
                    if (redirectToFieldWorkspaceIfNeeded(userDataNormalized, availableModules)) {
                        return;
                    }

                    // Renderizza dashboard con moduli
                    await renderDashboard(userDataNormalized, availableModules);
                    await finishDashboardLoad(availableModules, userDataNormalized, currentTenantId, user);
                }
            } catch (error) {
                console.error('Errore caricamento dati utente:', error);
                document.getElementById('user-info').textContent = 
                    `Utente: ${user.email}`;
                document.getElementById('user-roles').innerHTML = 
                    '<span class="role-badge">Errore caricamento</span>';
                
                // Renderizza dashboard vuota
                renderDashboard({ ruoli: [] }, []);
                updateDocumentationGuideLink([], {});
            }
        });

        /**
         * Setup switch tenant button (mostra solo se utente ha più tenant)
         */
        async function setupTenantSwitch(userId, userData) {
            try {
                const { getUserTenants } = await import('./services/tenant-service.js');
                const { getCurrentTenantId } = await import('./services/tenant-service.js');
                const tenants = await getUserTenants(userId);
                
                const switchButton = document.getElementById('switch-tenant-button');
                const switchText = document.getElementById('switch-tenant-text');
                
                // Mostra pulsante solo se più di un tenant
                if (tenants.length > 1) {
                    switchButton.style.display = 'inline-flex';
                    
                    // Mostra nome tenant corrente
                    const currentTenantId = getCurrentTenantId();
                    const currentTenant = tenants.find(t => t.tenantId === currentTenantId);
                    if (currentTenant) {
                        // Usa nome tenant se disponibile, altrimenti ID formattato
                        const tenantName = currentTenant.nome || currentTenantId.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
                        switchText.textContent = tenantName;
                    }
                    
                    // Event listener per switch tenant
                    switchButton.addEventListener('click', async () => {
                        try {
                            const { showTenantSelector, handleTenantSelection } = await import('./services/tenant-selection-service.js');
                            
                            const selectedTenantId = await showTenantSelector(tenants, async (tenantId) => {
                                try {
                                    await handleTenantSelection(tenantId);
                                    // Ricarica la pagina per aggiornare tutti i dati
                                    window.location.reload();
                                } catch (error) {
                                    console.error('Errore switch tenant:', error);
                                    alert('Errore durante il cambio azienda. Riprova.');
                                }
                            });
                        } catch (error) {
                            console.error('Errore apertura selettore tenant:', error);
                            alert('Errore durante l\'apertura del selettore aziende. Riprova.');
                        }
                    });
                } else {
                    switchButton.style.display = 'none';
                }
            } catch (error) {
                console.warn('Errore setup switch tenant:', error);
                // Nascondi pulsante in caso di errore
                const switchButton = document.getElementById('switch-tenant-button');
                if (switchButton) {
                    switchButton.style.display = 'none';
                }
            }
        }

        // Pulizia listener quando si chiude la pagina
        window.addEventListener('beforeunload', () => {
            if (manutenzioniUnsubscribe) {
                manutenzioniUnsubscribe();
                manutenzioniUnsubscribe = null;
            }
        });

        // Logout
        document.getElementById('logout-button').addEventListener('click', async () => {
            try {
                // Ferma l'aggiornamento dello stato online
                if (window.gfvOnlineInterval) {
                    clearInterval(window.gfvOnlineInterval);
                }
                
                // Pulizia listener manutenzioni
                if (manutenzioniUnsubscribe) {
                    manutenzioniUnsubscribe();
                    manutenzioniUnsubscribe = null;
                }
                
                // Imposta offline prima del logout
                const user = auth.currentUser;
                if (user) {
                    try {
                        const userDocRef = doc(db, 'users', user.uid);
                        await updateDoc(userDocRef, {
                            isOnline: false
                        });
                    } catch (error) {
                        console.warn('Errore aggiornamento stato offline:', error);
                    }
                }
                
                // Rimuovi anche il flag di sessione
                sessionStorage.removeItem('gfv_expected_user_id');
                sessionStorage.removeItem('gfv_user_just_registered');
                await signOut(auth);
                window.location.href = loginPageUrl();
            } catch (error) {
                console.error('Errore logout:', error);
                alert('Errore durante il logout');
            }
        });

    </script>
    
    <!-- Service Worker Registration for PWA (solo produzione / GitHub Pages, non localhost) -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const host = window.location.hostname || '';
                if (host === 'localhost' || host === '127.0.0.1') {
                    return;
                }
                const swPath = window.location.pathname.includes('/gfv-platform/')
                    ? '/gfv-platform/service-worker.js'
                    : '../service-worker.js';
                navigator.serviceWorker.register(swPath)
                    .catch((error) => {
                        console.error('Registrazione Service Worker fallita:', error);
                    });
            });
        }
    </script>
